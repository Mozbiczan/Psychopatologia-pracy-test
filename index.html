<!doctype html>
<html lang="pl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Psychopatologia pracy — test</title>
<style>
:root {
  --bg1:#fff1f2;
  --bg2:#f8fafc;
  --card:#ffffff;
  --text:#171827;
  --muted:#6b7280;
  --primary:#c8102e;
  --primary-dark:#780019;
  --primary-soft:#ffe4e8;
  --good:#16a34a;
  --good-bg:#dcfce7;
  --bad:#dc2626;
  --bad-bg:#fee2e2;
  --warn:#d97706;
  --warn-bg:#fffbeb;
  --border:#e5e7eb;
  --shadow:0 22px 60px rgba(31,41,55,.12);
}
*{box-sizing:border-box}
body{
  margin:0;
  min-height:100vh;
  font-family:Inter,Segoe UI,Arial,sans-serif;
  color:var(--text);
  background:
    radial-gradient(circle at top left,rgba(200,16,46,.19),transparent 34%),
    radial-gradient(circle at bottom right,rgba(120,0,25,.13),transparent 34%),
    linear-gradient(135deg,var(--bg1),var(--bg2));
}
button{font:inherit}
.app{max-width:1040px;margin:0 auto;padding:28px}
.screen{display:none}
.screen.active{display:block}
.hero{
  min-height:88vh;
  display:flex;
  align-items:center;
  justify-content:center;
}
.hero-card{
  width:100%;
  max-width:900px;
  padding:58px 54px;
  text-align:center;
  background:rgba(255,255,255,.91);
  backdrop-filter:blur(14px);
  border:1px solid rgba(255,255,255,.78);
  border-radius:32px;
  box-shadow:var(--shadow);
}
h1{
  margin:0 0 16px;
  font-size:clamp(38px,5vw,66px);
  line-height:1;
  letter-spacing:-.05em;
}
.subtitle{
  max-width:740px;
  margin:0 auto;
  color:var(--muted);
  font-size:18px;
  line-height:1.6;
}
.stats{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:12px;
  margin:32px 0;
}
.stat{
  padding:17px 14px;
  background:#fff;
  border:1px solid var(--border);
  border-radius:18px;
}
.stat strong{
  display:block;
  font-size:28px;
  color:var(--primary-dark);
}
.stat span{font-size:13px;color:var(--muted)}
.start-actions{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:14px;
  max-width:700px;
  margin:0 auto;
}
.mode-button{
  min-height:92px;
  padding:18px 20px;
  border:0;
  border-radius:20px;
  cursor:pointer;
  text-align:left;
  color:white;
  background:linear-gradient(135deg,var(--primary),var(--primary-dark));
  box-shadow:0 14px 32px rgba(200,16,46,.22);
  transition:.18s;
}
.mode-button:hover{transform:translateY(-2px)}
.mode-button.secondary{
  color:#49101b;
  background:#fff;
  border:2px solid #fecdd3;
  box-shadow:none;
}
.mode-button b{display:block;font-size:18px;margin-bottom:5px}
.mode-button span{display:block;font-size:13px;line-height:1.4;opacity:.88}
.quiz-shell{max-width:860px;margin:24px auto}
.top-nav{
  display:flex;
  justify-content:space-between;
  align-items:center;
  gap:12px;
  margin-bottom:15px;
}
.pill{
  display:inline-flex;
  align-items:center;
  padding:10px 14px;
  margin-right:7px;
  border-radius:999px;
  background:rgba(255,255,255,.88);
  border:1px solid rgba(255,255,255,.85);
  font-weight:800;
  color:#374151;
}
.small-button{
  border:1px solid var(--border);
  border-radius:14px;
  padding:11px 15px;
  background:#fff;
  color:#374151;
  font-weight:850;
  cursor:pointer;
}
.progress-wrap{
  width:100%;
  height:12px;
  margin:14px 0 24px;
  overflow:hidden;
  border-radius:999px;
  background:rgba(255,255,255,.72);
  border:1px solid rgba(255,255,255,.82);
}
.progress{
  height:100%;
  width:0;
  background:linear-gradient(90deg,var(--primary),var(--primary-dark));
  transition:.25s;
}
.question-card{
  padding:32px;
  border-radius:28px;
  background:rgba(255,255,255,.95);
  border:1px solid rgba(255,255,255,.84);
  box-shadow:var(--shadow);
}
.category{
  display:inline-flex;
  margin-bottom:13px;
  padding:7px 11px;
  border-radius:999px;
  background:var(--primary-soft);
  color:#9f1239;
  font-size:12px;
  font-weight:900;
  letter-spacing:.05em;
  text-transform:uppercase;
}
.question-title{
  margin:0 0 23px;
  font-size:27px;
  line-height:1.27;
  letter-spacing:-.025em;
}
.answer{
  display:flex;
  align-items:flex-start;
  gap:14px;
  width:100%;
  margin:10px 0;
  padding:16px;
  border:2px solid var(--border);
  border-radius:18px;
  background:#fff;
  cursor:pointer;
  line-height:1.43;
  transition:.16s;
}
.answer:hover{border-color:#fecdd3;transform:translateY(-1px)}
.answer.locked{cursor:default;transform:none}
.letter{
  flex:0 0 36px;
  width:36px;
  height:36px;
  display:grid;
  place-items:center;
  border-radius:12px;
  background:var(--primary-soft);
  color:#9f1239;
  font-weight:950;
}
.answer-text{padding-top:7px}
.answer.correct{border-color:var(--good);background:var(--good-bg)}
.answer.correct .letter{background:var(--good);color:white}
.answer.wrong{border-color:var(--bad);background:var(--bad-bg)}
.answer.wrong .letter{background:var(--bad);color:white}
.feedback{
  display:none;
  margin-top:18px;
  padding:16px;
  border-radius:18px;
  font-weight:900;
}
.feedback.good{display:block;background:var(--good-bg);color:#166534}
.feedback.bad{display:block;background:var(--bad-bg);color:#991b1b}
.question-actions{
  display:flex;
  justify-content:space-between;
  gap:12px;
  margin-top:22px;
  flex-wrap:wrap;
}
.action-group{display:flex;gap:10px;flex-wrap:wrap}
.primary-button,.report-button{
  border:0;
  border-radius:15px;
  padding:14px 18px;
  font-weight:900;
  cursor:pointer;
}
.primary-button{
  color:white;
  background:linear-gradient(135deg,var(--primary),var(--primary-dark));
  box-shadow:0 10px 25px rgba(200,16,46,.2);
}
.primary-button:disabled{opacity:.5;cursor:not-allowed}
.report-button{
  color:#92400e;
  background:var(--warn-bg);
  border:1px solid #fde68a;
}
.result-card{
  max-width:780px;
  margin:40px auto;
  padding:44px;
  text-align:center;
  border-radius:32px;
  background:rgba(255,255,255,.95);
  border:1px solid rgba(255,255,255,.85);
  box-shadow:var(--shadow);
}
.result-label{
  display:inline-flex;
  padding:8px 12px;
  border-radius:999px;
  color:#9f1239;
  background:var(--primary-soft);
  font-size:13px;
  font-weight:900;
}
.result-score{
  margin:14px 0 4px;
  color:var(--primary-dark);
  font-size:70px;
  line-height:1;
  font-weight:1000;
  letter-spacing:-.06em;
}
.result-percent{
  display:inline-flex;
  padding:9px 15px;
  border-radius:999px;
  background:#fff1f2;
  color:#9f1239;
  font-weight:900;
}
.result-description{
  max-width:580px;
  margin:18px auto 24px;
  color:var(--muted);
  line-height:1.55;
}
.result-actions{
  display:flex;
  justify-content:center;
  gap:12px;
  flex-wrap:wrap;
}
.retry-button{
  border:0;
  border-radius:16px;
  padding:15px 19px;
  color:white;
  background:linear-gradient(135deg,var(--primary),var(--primary-dark));
  font-weight:900;
  cursor:pointer;
}
.retry-button[hidden]{display:none}
.review{
  max-height:360px;
  margin-top:28px;
  padding-top:17px;
  overflow:auto;
  text-align:left;
  border-top:1px solid var(--border);
}
.review-item{
  padding:13px 0;
  border-bottom:1px solid #f1f5f9;
}
.review-item b{display:block;margin-bottom:5px;line-height:1.35}
.ok{color:var(--good);font-weight:900}
.no{color:var(--bad);font-weight:900}
@media(max-width:760px){
  .app{padding:15px}
  .hero-card{padding:34px 22px}
  .stats{grid-template-columns:1fr}
  .start-actions{grid-template-columns:1fr}
  .question-card{padding:22px}
  .question-title{font-size:22px}
  .top-nav{align-items:flex-start;flex-direction:column}
  .question-actions{flex-direction:column}
  .action-group{width:100%}
  .action-group button{flex:1}
  .result-card{padding:30px 21px}
  .result-score{font-size:58px}
}

body.quiz-mode,
body.result-mode {
  overflow: hidden;
}

body.quiz-mode #quizScreen,
body.result-mode #resultScreen {
  position: fixed;
  inset: 0;
  z-index: 9999;
  display: block;
  min-height: 100vh;
  overflow-y: auto;
  background:
    radial-gradient(circle at top left,rgba(200,16,46,.19),transparent 34%),
    radial-gradient(circle at bottom right,rgba(120,0,25,.13),transparent 34%),
    linear-gradient(135deg,var(--bg1),var(--bg2));
}

body.quiz-mode #quizScreen .quiz-shell,
body.result-mode #resultScreen .result-card {
  min-height: calc(100vh - 48px);
}

body.quiz-mode #quizScreen .quiz-shell {
  display: flex;
  flex-direction: column;
  justify-content: flex-start;
  padding-top: 12px;
}

body.quiz-mode #quizScreen .question-card {
  flex: 1;
}

body.result-mode #resultScreen {
  padding: 24px 16px;
}

@media(max-width:760px){
  body.quiz-mode #quizScreen,
  body.result-mode #resultScreen {
    padding: 0;
  }

  body.quiz-mode #quizScreen .quiz-shell {
    width: 100%;
    max-width: none;
    min-height: 100vh;
    margin: 0;
    padding: 14px;
  }

  body.quiz-mode #quizScreen .question-card {
    min-height: calc(100vh - 130px);
    border-radius: 22px;
  }

  body.result-mode #resultScreen .result-card {
    min-height: 100vh;
    margin: 0;
    border-radius: 0;
  }
}

</style>
</head>
<body>
<div class="app">

<section id="startScreen" class="screen active hero">
  <div class="hero-card">
    <h1>Psychopatologia pracy</h1>
    <p class="subtitle">Jeśli znajdziesz błędne pytanie, zgłoś je za pomocą przycisku „Zgłoś pytanie”.</p>

    <div class="stats">
      <div class="stat"><strong>84</strong><span>pytania w bazie</span></div>
      <div class="stat"><strong>20</strong><span>pytań w przykładowym teście</span></div>
      <div class="stat"><strong>1</strong><span>poprawna odpowiedź</span></div>
    </div>

    <div class="start-actions">
      <button class="mode-button" onclick="startSampleTest()">
        <b>Rozwiąż przykładowy test</b>
        <span>20 losowych pytań wybranych z całej bazy.</span>
      </button>
      <button class="mode-button secondary" onclick="startFullTest()">
        <b>Rozwiąż całą bazę</b>
        <span>Wszystkie 84 pytania w losowej kolejności.</span>
      </button>
    </div>
  </div>
</section>

<section id="quizScreen" class="screen">
  <div class="quiz-shell">
    <div class="top-nav">
      <div>
        <span class="pill" id="counterPill">Pytanie 1 / 1</span>
        <span class="pill" id="scorePill">Wynik: 0</span>
      </div>
      <button class="small-button" onclick="finishEarly()">Zakończ test</button>
    </div>

    <div class="progress-wrap"><div id="progress" class="progress"></div></div>
    <div id="questionCard" class="question-card"></div>
  </div>
</section>

<section id="resultScreen" class="screen">
  <div class="result-card">
    <span class="result-label">WYNIK KOŃCOWY</span>
    <div id="finalScore" class="result-score">0 / 0</div>
    <div id="finalPercent" class="result-percent">0%</div>
    <p id="resultDescription" class="result-description"></p>

    <div class="result-actions">
      <button class="small-button" onclick="goHome()">Zakończ</button>
      <button id="wrongTestButton" class="retry-button" onclick="startWrongTest()">
        Rozwiąż test z błędnych pytań
      </button>
    </div>

    <div id="review" class="review"></div>
  </div>
</section>

</div>

owania D", "correct": false}]}, {"id": "g6", "q": "Zgodnie z zaleceniami WHO \"dawka\" regularnej aktywności fizycznej wpływająca na zdrowie to:", "answers": [{"text": "godzina umiarkowanego wysiłku fizycznego w ciągu tygodnia", "correct": false}, {"text": "2 godziny umiarkowanego wysiłku fizycznego w ciągu tygodnia", "correct": false}, {"text": "2 i pół godziny umiarkowanego wysiłku fizycznego w ciągu tygodnia", "correct": true}, {"text": "3 godziny umiarkowanego wysiłku fizycznego w ciągu tygodnia", "correct": false}]}, {"id": "g7", "q": "Minimalna interwencja antynikotynowa (MIA) w medycynie składa się z pięciu kroków. Pierwszy z nich – pytaj, polega na tym, że:", "answers": [{"text": "pacjent palący papierosy powinien otrzymać poradę dotyczącą zaprzestania palenia, uwzględniającą jego sytuację zdrowotną i życiową|", "correct": false}, {"text": "lekarz powinien zapytać pacjenta o gotowość do zaprzestania palenia", "correct": false}, {"text": "podczas każdej wizyty lekarz powinien dowiedzieć się, czy pacjent pali papierosy", "correct": true}, {"text": "lekarz powinien zaplanować wizyty kontrolne po rzuceniu palenia przez pacjenta", "correct": false}]}, {"id": "g8", "q": "Zjawisko wtórnych zysków z choroby polega na tym, że:", "answers": [{"text": "tylko dzięki chorobie możliwe jest zaspokajanie ważnych dla pacjenta potrzeb", "correct": true}, {"text": "pacjent doświadcza więcej korzyści niż strat w sytuacji choroby", "correct": false}, {"text": "pacjent nie przyjmuje do wiadomości negatywnych konsekwencji choroby", "correct": false}, {"text": "pacjent poszukuje informacji w celu redukcji lęku", "correct": false}]}, {"id": "g9", "q": "Reakcja zaprzeczania chorobie:", "answers": [{"text": "może ulec zmianie pod wpływem logicznej argumentacji", "correct": false}, {"text": "nie pozwala na zbudowanie obrazu własnej choroby", "correct": true}, {"text": "nie ma znaczenia dla podejmowanych zachowań zdrowotnych", "correct": false}, {"text": "jest reakcją świadomą", "correc const SAMPLE_SIZE = 20;

let activeQuestions = [];
let currentIndex = 0;
let score = 0;
let locked = false;
let attemptResults = [];
let wrongQuestionIds = [];

function shuffle(array) {
  return array
    .map(value => [Math.random(), value])
    .sort((a,b) => a[0] - b[0])
    .map(pair => pair[1]);
}

function cloneAndShuffle(pool) {
  return shuffle(pool).map(q => ({
    ...q,
    answers: shuffle(q.answers.map(a => ({...a})))
  }));
}

function showScreen(id) {
  document.querySelectorAll('.screen').forEach(screen => screen.classList.remove('active'));
  document.getElementById(id).classList.add('active');

  document.body.classList.remove('quiz-mode', 'result-mode');

  if (id === 'quizScreen') {
    document.body.classList.add('quiz-mode');
  } else if (id === 'resultScreen') {
    document.body.classList.add('result-mode');
  }

  window.scrollTo({ top: 0, left: 0, behavior: 'instant' });
}

function startAttempt(pool) {
  activeQuestions = cloneAndShuffle(pool);
  currentIndex = 0;
  score = 0;
  locked = false;
  attemptResults = [];
  wrongQuestionIds = [];
  showScreen('quizScreen');
  renderQuestion();
}

function startSampleTest() {
  const selected = shuffle(DATA).slice(0, Math.min(SAMPLE_SIZE, DATA.length));
  startAttempt(selected);
}

function startFullTest() {
  startAttempt(DATA);
}

function startWrongTest() {
  const pool = DATA.filter(q => wrongQuestionIds.includes(q.id));
  if (!pool.length) {
    goHome();
    return;
  }
  startAttempt(pool);
}

function renderQuestion() {
  locked = false;

  const quizScreen = document.getElementById('quizScreen');
  if (quizScreen) quizScreen.scrollTop = 0;
  const q = activeQuestions[currentIndex];
  const letters = ['A','B','C','D'];
  const card = document.getElementById('questionCard');

  document.getElementById('counterPill').textContent =
    'Pytanie ' + (currentIndex + 1) + ' / ' + activeQuestions.length;
  document.getElementById('scorePill').textContent = 'Wynik: ' + score;
  document.getElementById('progress').style.width =
    ((currentIndex) / activeQuestions.length * 100) + '%';

  card.innerHTML = '';

  const category = document.createElement('div');
  category.className = 'category';
  category.textContent = 'Psychopatologia pracy';
  card.appendChild(category);

  const title = document.createElement('h2');
  title.className = 'question-title';
  title.textContent = q.q;
  card.appendChild(title);

  q.answers.forEach((answer, answerIndex) => {
    const option = document.createElement('div');
    option.className = 'answer';
    option.innerHTML =
      '<div class="letter">' + letters[answerIndex] + '</div>' +
      '<div class="answer-text">' + escapeHtml(answer.text) + '</div>';
    option.onclick = () => chooseAnswer(answerIndex);
    card.appendChild(option);
  });

  const feedback = document.createElement('div');
  feedback.id = 'feedback';
  feedback.className = 'feedback';
  card.appendChild(feedback);

  const actions = document.createElement('div');
  actions.className = 'question-actions';
  actions.innerHTML = `
    <div class="action-group">
      <button class="report-button" onclick="reportQuestion()">Zgłoś pytanie</button>
      <button class="small-button" onclick="skipQuestion()">Pomiń</button>
    </div>
    <div class="action-group">
      <button id="nextButton" class="primary-button" onclick="nextQuestion()" disabled>Następne</button>
    </div>
  `;
  card.appendChild(actions);
}

function chooseAnswer(answerIndex) {
  if (locked) return;
  locked = true;

  const q = activeQuestions[currentIndex];
  const chosen = q.answers[answerIndex];
  const correct = q.answers.find(a => a.correct);
  const isCorrect = !!chosen.correct;
  const displayedAnswers = [...document.querySelectorAll('.answer')];

  displayedAnswers.forEach((element, index) => {
    element.classList.add('locked');
    if (q.answers[index].correct) element.classList.add('correct');
  });

  if (!isCorrect) {
    displayedAnswers[answerIndex].classList.add('wrong');
    wrongQuestionIds.push(q.id);
  } else {
    score += 1;
  }

  attemptResults.push({
    id: q.id,
    q: q.q,
    ok: isCorrect,
    chosen: chosen.text,
    correct: correct.text
  });

  const feedback = document.getElementById('feedback');
  feedback.className = 'feedback ' + (isCorrect ? 'good' : 'bad');
  feedback.textContent = isCorrect
    ? 'Dobrze ✅'
    : 'Źle ❌ — poprawna odpowiedź jest podświetlona na zielono.';

  document.getElementById('scorePill').textContent = 'Wynik: ' + score;
  document.getElementById('nextButton').disabled = false;
}

function skipQuestion() {
  if (locked) return;
  locked = true;

  const q = activeQuestions[currentIndex];
  const correct = q.answers.find(a => a.correct);
  const displayedAnswers = [...document.querySelectorAll('.answer')];

  displayedAnswers.forEach((element, index) => {
    element.classList.add('locked');
    if (q.answers[index].correct) element.classList.add('correct');
  });

  wrongQuestionIds.push(q.id);
  attemptResults.push({
    id: q.id,
    q: q.q,
    ok: false,
    chosen: 'Pominięto',
    correct: correct.text
  });

  const feedback = document.getElementById('feedback');
  feedback.className = 'feedback bad';
  feedback.textContent = 'Pominięte — poprawna odpowiedź jest podświetlona na zielono.';
  document.getElementById('nextButton').disabled = false;
}

function nextQuestion() {
  if (currentIndex < activeQuestions.length - 1) {
    currentIndex += 1;
    renderQuestion();
  } else {
    showResult();
  }
}

function finishEarly() {
  if (!confirm('Zakończyć test przed odpowiedzią na wszystkie pytania?')) return;

  const answeredIds = new Set(attemptResults.map(result => result.id));
  activeQuestions.forEach(q => {
    if (!answeredIds.has(q.id)) {
      const correct = q.answers.find(a => a.correct);
      wrongQuestionIds.push(q.id);
      attemptResults.push({
        id: q.id,
        q: q.q,
        ok: false,
        chosen: 'Nie udzielono odpowiedzi',
        correct: correct.text
      });
    }
  });

  showResult();
}

function showResult() {
  wrongQuestionIds = [...new Set(wrongQuestionIds)];
  showScreen('resultScreen');

  const total = activeQuestions.length;
  const percent = total ? Math.round(score / total * 100) : 0;
  document.getElementById('finalScore').textContent = score + ' / ' + total;
  document.getElementById('finalPercent').textContent = percent + '%';

  let text = 'Możesz zakończyć albo przećwiczyć jeszcze raz wyłącznie błędne pytania.';
  if (percent === 100) text = 'Wszystkie odpowiedzi są poprawne — nie ma pytań do powtórki.';
  else if (percent >= 80) text = 'Bardzo dobry wynik. Zostało tylko kilka pytań do utrwalenia.';
  else if (percent >= 60) text = 'Jest dobrze, ale test z błędnych pytań pomoże utrwalić trudniejsze zagadnienia.';
  else text = 'Uruchom test z błędnych pytań, żeby przećwiczyć dokładnie te zagadnienia, które sprawiły trudność.';

  document.getElementById('resultDescription').textContent = text;

  const wrongButton = document.getElementById('wrongTestButton');
  wrongButton.hidden = wrongQuestionIds.length === 0;
  wrongButton.textContent = wrongQuestionIds.length
    ? 'Rozwiąż test z błędnych pytań (' + wrongQuestionIds.length + ')'
    : 'Rozwiąż test z błędnych pytań';

  const review = document.getElementById('review');
  review.innerHTML = '<h3>Podsumowanie odpowiedzi</h3>';

  attemptResults.forEach((result, index) => {
    const item = document.createElement('div');
    item.className = 'review-item';
    item.innerHTML =
      '<b>' + (index + 1) + '. ' + escapeHtml(result.q) + '</b>' +
      '<span class="' + (result.ok ? 'ok' : 'no') + '">' +
      (result.ok ? 'Dobrze' : 'Źle') + '</span><br>' +
      '<small>Twoja odpowiedź: ' + escapeHtml(result.chosen) + '</small><br>' +
      '<small>Poprawna odpowiedź: ' + escapeHtml(result.correct) + '</small>';
    review.appendChild(item);
  });
}

function goHome() {
  activeQuestions = [];
  attemptResults = [];
  wrongQuestionIds = [];
  showScreen('startScreen');
}

function escapeHtml(text) {
  return String(text)
    .replace(/&/g,'&amp;')
    .replace(/</g,'&lt;')
    .replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;')
    .replace(/'/g,'&#039;');
}

function reportQuestion() {
  const q = activeQuestions[currentIndex];
  const host = window.location.hostname;
  const pathParts = window.location.pathname.split('/').filter(Boolean);

  let owner = '';
  let repo = '';

  if (host.endsWith('.github.io')) {
    owner = host.replace('.github.io','');
    repo = pathParts[0] || '';
  }

  const correct = q.answers.find(a => a.correct);
  const title = '[Błąd w pytaniu] ' + q.q.slice(0,80);
  const body =
`Zgłaszam błąd w pytaniu.

**Treść pytania:**
${q.q}

**Odpowiedzi:**
${q.answers.map((answer,index) =>
  `${String.fromCharCode(65+index)}. ${answer.text}`
).join('\n')}

**Poprawna odpowiedź według testu:**
${correct ? correct.text : 'brak'}

**Co należy poprawić?**
Opisz tutaj błąd:
`;

  if (owner && repo) {
    const url =
      'https://github.com/' + owner + '/' + repo +
      '/issues/new?title=' + encodeURIComponent(title) +
      '&body=' + encodeURIComponent(body);
    window.open(url,'_blank');
    return;
  }

  alert(
    'Przycisk będzie automatycznie tworzył zgłoszenie po opublikowaniu testu na GitHub Pages.\n\n' +
    'Treść pytania:\n' + q.q
  );
}
</script>
